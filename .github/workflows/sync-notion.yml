name: Sync Notion to Knowledge Base

on:
  schedule:
    - cron: "0 0 * * *" # Every day at 00:00 UTC
  workflow_dispatch:

env:
  AWS_REGION: "us-east-1"
  AWS_ROLE_NAME: "lambda-gurumi-ai-bot"
  STACK_NAME: "lambda-gurumi-ai-bot-dev"

  NOTION_PAGE_NAME: "nalbam"
  NOTION_PAGE_ID: "7aace0412a82431996f61a29225a95ec"

  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}

permissions:
  id-token: write
  contents: read

jobs:
  sync:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Python 3.12 🐍
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install notion-exporter

      - name: Export Notion pages to Markdown
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python scripts/notion/export.py

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: "arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/${{ env.AWS_ROLE_NAME }}"
          role-session-name: github-actions-sync-notion
          aws-region: ${{ env.AWS_REGION }}

      - name: Get S3 bucket name from CloudFormation
        id: stack
        run: |
          BUCKET=$(aws cloudformation describe-stack-resource \
            --stack-name ${{ env.STACK_NAME }} \
            --logical-resource-id S3Bucket \
            --query "StackResourceDetail.PhysicalResourceId" \
            --output text)
          echo "bucket=${BUCKET}" >> "$GITHUB_OUTPUT"

          KB_ID=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='KnowledgeBaseId'].OutputValue" \
            --output text)
          echo "kb_id=${KB_ID}" >> "$GITHUB_OUTPUT"

          DS_ID=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='DataSourceId'].OutputValue" \
            --output text)
          echo "ds_id=${DS_ID}" >> "$GITHUB_OUTPUT"

      - name: Sync documents to S3
        run: |
          aws s3 sync --delete \
            build/${{ env.NOTION_PAGE_NAME }}/ \
            s3://${{ steps.stack.outputs.bucket }}/documents/${{ env.NOTION_PAGE_NAME }}/

      - name: Start Knowledge Base ingestion
        run: |
          aws bedrock-agent start-ingestion-job \
            --knowledge-base-id ${{ steps.stack.outputs.kb_id }} \
            --data-source-id ${{ steps.stack.outputs.ds_id }} \
            --region ${{ env.AWS_REGION }}
