    #           OverlapPercentage: 20

    # --- End RAG ---

    BedrockAgentRole:
      Type: AWS::IAM::Role
      Properties:
        RoleName:
          Fn::Sub: lambda-${self:provider.environment.BASE_NAME}-agent-role
        AssumeRolePolicyDocument:
          Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Principal:
                Service: bedrock.amazonaws.com
              Action: sts:AssumeRole
              Condition:
                StringEquals:
                  aws:SourceAccount:
                    Ref: AWS::AccountId
                ArnLike:
                  aws:SourceArn:
                    Fn::Sub: arn:aws:bedrock:${self:provider.region}:${AWS::AccountId}:agent/*
        Policies:
          - PolicyName: BedrockAgentPolicy
            PolicyDocument:
              Version: "2012-10-17"
              Statement:
                - Sid: InvokeModels
                  Effect: Allow
                  Action:
                    - bedrock:InvokeModel
                    - bedrock:InvokeModelWithResponseStream
                  Resource:
                    - "arn:aws:bedrock:*::foundation-model/*"
                    - Fn::Sub: arn:aws:bedrock:*:${AWS::AccountId}:inference-profile/*
                - Sid: InferenceProfiles
                  Effect: Allow
                  Action:
                    - bedrock:GetFoundationModel
                    - bedrock:GetInferenceProfile
                  Resource: "*"
                # --- RAG: uncomment when Knowledge Base is enabled ---
                # - Sid: KnowledgeBaseRetrieve
                #   Effect: Allow
                #   Action:
                #     - bedrock:Retrieve
                #   Resource:
                #     Fn::GetAtt: [BedrockKnowledgeBase, KnowledgeBaseArn]
        Tags:
          - Key: Project
            Value: ${self:provider.environment.BASE_NAME}

    BedrockAgent:
      Type: AWS::Bedrock::Agent
      DependsOn:
        - BedrockAgentRole
        # - BedrockKnowledgeBase  # uncomment when KB is enabled
      Properties:
        AgentName: ${self:provider.environment.BASE_NAME}
        Description: AWSKRUG AI assistant gurumi
        FoundationModel: ${self:provider.environment.FOUNDATION_MODEL}
        AgentResourceRoleArn:
          Fn::GetAtt: [BedrockAgentRole, Arn]
        Instruction: >-
          You are Gurumi (구루미), the friendly and professional AI assistant of AWSKRUG (AWS Korea User Group).
          Answer every user question directly using your own general knowledge.
          You have no external tools, APIs, or knowledge bases available; never claim a request is out of scope,
          out of domain, or beyond your tools - always attempt a helpful answer from your internal knowledge.
          If you truly do not know something, say so honestly. Respond in natural, easy-to-understand Korean.
        IdleSessionTTLInSeconds: 600
        AutoPrepare: true
        # Override default ORCHESTRATION template to remove outOfDomain refusal behavior
        # (Nova Pro with no actions/KB refuses everything under the default template).
        PromptOverrideConfiguration:
          PromptConfigurations:
            - PromptType: ORCHESTRATION
              PromptCreationMode: OVERRIDDEN
              PromptState: ENABLED
              BasePromptTemplate: |
                {"system":"\n\n\nAgent Description:\n$instruction$\n\nAlways follow these instructions:\n- You have NO external actions, tools, APIs, or knowledge bases. Never call any action.\n- Answer every user question directly using your own general knowledge.\n- NEVER say a request is out of scope, out of domain, or beyond your tools. Always attempt a helpful answer.\n- If you truly do not know the factual answer, say so honestly in Korean, but still try to help.\n- Always generate a Thought within <thinking> </thinking> tags before responding. Keep it brief.\n- Provide your final response within <answer> </answer> tags. Respond in natural Korean.\n$knowledge_base_additional_guideline$\n$memory_guideline$\n$memory_content$\n$memory_action_guideline$\n$prompt_session_attributes$\n","messages":[{"role":"user","content":[{"text":"$question$"}]},{"role":"assistant","content":[{"text":"$agent_scratchpad$"}]},{"role":"assistant","content":[{"text":"Thought: <thinking>\n"}]}]}
              InferenceConfiguration:
                Temperature: 0.3
                TopP: 0.9
                TopK: 50
                MaximumLength: 2048
                StopSequences:
                  - "</answer>"
              ParserMode: DEFAULT
        # --- RAG: uncomment when Knowledge Base is enabled ---
        # KnowledgeBases:
        #   - KnowledgeBaseId:
        #       Fn::GetAtt: [BedrockKnowledgeBase, KnowledgeBaseId]
        #     Description: RAG knowledge base for document retrieval
        #     KnowledgeBaseState: ENABLED
        Tags:
          Project: ${self:provider.environment.BASE_NAME}

    BedrockAgentAlias:
      Type: AWS::Bedrock::AgentAlias
      DependsOn: BedrockAgent
      Properties:
        AgentId:
          Fn::GetAtt: [BedrockAgent, AgentId]
        AgentAliasName: live
        Description: Production alias for gurumi agent
        Tags:
          Project: ${self:provider.environment.BASE_NAME}

  Outputs:
    AgentId:
      Value:
        Fn::GetAtt: [BedrockAgent, AgentId]
    AgentAliasId:
      Value:
        Fn::GetAtt: [BedrockAgentAlias, AgentAliasId]
    # --- RAG: uncomment when Knowledge Base is enabled ---
    # KnowledgeBaseId:
    #   Value:
    #     Fn::GetAtt: [BedrockKnowledgeBase, KnowledgeBaseId]
    # DataSourceId:
    #   Value:
    #     Fn::GetAtt: [BedrockDataSource, DataSourceId]

plugins:
  - serverless-python-requirements
  - serverless-dotenv-plugin
