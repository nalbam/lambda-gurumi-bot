# yaml-language-server: $schema=https://raw.githubusercontent.com/lalcebo/json-schema/master/serverless/reference.json
service: lambda-gurumi-ai-bot
provider:
  name: aws
  region: us-east-1
  runtime: python3.12
  stage: ${opt:stage, 'dev'}
  architecture: arm64
  memorySize: 5120
  timeout: 90
  environment:
    BASE_NAME: gurumi-ai-bot
  iamRoleStatements:
    - Effect: Allow
      Action:
        - dynamodb:GetItem
        - dynamodb:PutItem
        - dynamodb:Query
      Resource:
        - "arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.BASE_NAME}-*"
        - "arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.BASE_NAME}-*/index/*"
    - Effect: Allow
      Action:
        - bedrock:InvokeAgent
      Resource:
        - "arn:aws:bedrock:${self:provider.region}:*:agent-alias/*"

functions:
  mention:
    handler: handler.lambda_handler
    events:
      - http:
          method: post
          path: /slack/events

  # kakao:
  #   handler: handler.kakao_handler
  #   events:
  #     - http:
  #         method: post
  #         path: /kakao/events

resources:
  Resources:
    DynamoDBTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.BASE_NAME}-${self:provider.stage}
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
          - AttributeName: user
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: user-index
            KeySchema:
              - AttributeName: user
                KeyType: HASH
            Projection:
              ProjectionType: KEYS_ONLY
            ProvisionedThroughput:
              ReadCapacityUnits: 5
              WriteCapacityUnits: 5
        ProvisionedThroughput:
          ReadCapacityUnits: 5
          WriteCapacityUnits: 5
        TimeToLiveSpecification:
          AttributeName: expire_at
          Enabled: true
        Tags:
          - Key: Project
            Value: ${self:provider.environment.BASE_NAME}

    S3Bucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName:
          Fn::Sub: ${self:provider.environment.BASE_NAME}-${AWS::AccountId}
        Tags:
          - Key: Project
            Value: ${self:provider.environment.BASE_NAME}

    # S3 Vectors - Vector Bucket
    S3VectorBucket:
      Type: AWS::S3Vectors::VectorBucket
      Properties:
        VectorBucketName:
          Fn::Sub: ${self:provider.environment.BASE_NAME}-vectors-${AWS::AccountId}
        Tags:
          - Key: Project
            Value: ${self:provider.environment.BASE_NAME}

    # S3 Vectors - Vector Index
    S3VectorIndex:
      Type: AWS::S3Vectors::Index
      DependsOn: S3VectorBucket
      Properties:
        VectorBucketName:
          Fn::Sub: ${self:provider.environment.BASE_NAME}-vectors-${AWS::AccountId}
        IndexName: ${self:provider.environment.BASE_NAME}-index
        DataType: float32
        Dimension: 1024
        DistanceMetric: cosine
        Tags:
          - Key: Project
            Value: ${self:provider.environment.BASE_NAME}

    # IAM Role for Bedrock Knowledge Base
    BedrockKBRole:
      Type: AWS::IAM::Role
      Properties:
        RoleName:
          Fn::Sub: lambda-${self:provider.environment.BASE_NAME}-kb-role
        AssumeRolePolicyDocument:
          Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Principal:
                Service: bedrock.amazonaws.com
              Action: sts:AssumeRole
              Condition:
                StringEquals:
                  aws:SourceAccount:
                    Ref: AWS::AccountId
        Policies:
          - PolicyName: BedrockKBPolicy
            PolicyDocument:
              Version: "2012-10-17"
              Statement:
                - Sid: S3VectorsAccess
                  Effect: Allow
                  Action:
                    - s3vectors:PutVectors
                    - s3vectors:GetVectors
                    - s3vectors:DeleteVectors
                    - s3vectors:QueryVectors
                    - s3vectors:GetIndex
                  Resource:
                    Fn::GetAtt: [S3VectorIndex, IndexArn]
                - Sid: S3ListBucket
                  Effect: Allow
                  Action:
                    - s3:ListBucket
                  Resource:
                    Fn::GetAtt: [S3Bucket, Arn]
                - Sid: S3GetObject
                  Effect: Allow
                  Action:
                    - s3:GetObject
                  Resource:
                    Fn::Sub:
                      - "${BucketArn}/*"
                      - BucketArn:
                          Fn::GetAtt: [S3Bucket, Arn]
                - Sid: BedrockInvokeModel
                  Effect: Allow
                  Action:
                    - bedrock:InvokeModel
                  Resource:
                    Fn::Sub: arn:aws:bedrock:${self:provider.region}::foundation-model/amazon.titan-embed-text-v2:0
        Tags:
          - Key: Project
            Value: ${self:provider.environment.BASE_NAME}

    # Bedrock Knowledge Base with S3 Vectors
    BedrockKnowledgeBase:
      Type: AWS::Bedrock::KnowledgeBase
      DependsOn:
        - S3VectorIndex
        - BedrockKBRole
      Properties:
        Name:
          Fn::Sub: ${self:provider.environment.BASE_NAME}-kb
        Description: Knowledge base for gurumi-ai-bot RAG
        RoleArn:
          Fn::GetAtt: [BedrockKBRole, Arn]
        KnowledgeBaseConfiguration:
          Type: VECTOR
          VectorKnowledgeBaseConfiguration:
            EmbeddingModelArn:
              Fn::Sub: arn:aws:bedrock:${self:provider.region}::foundation-model/amazon.titan-embed-text-v2:0
        StorageConfiguration:
          Type: S3_VECTORS
          S3VectorsConfiguration:
            IndexArn:
              Fn::GetAtt: [S3VectorIndex, IndexArn]
        Tags:
          Project: ${self:provider.environment.BASE_NAME}

    # Bedrock Data Source (S3 documents/)
    BedrockDataSource:
      Type: AWS::Bedrock::DataSource
      DependsOn: BedrockKnowledgeBase
      Properties:
        Name: ${self:provider.environment.BASE_NAME}-datasource
        KnowledgeBaseId:
          Fn::GetAtt: [BedrockKnowledgeBase, KnowledgeBaseId]
        DataDeletionPolicy: RETAIN
        DataSourceConfiguration:
          Type: S3
          S3Configuration:
            BucketArn:
              Fn::GetAtt: [S3Bucket, Arn]
            InclusionPrefixes:
              - "documents/"
        VectorIngestionConfiguration:
          ChunkingConfiguration:
            ChunkingStrategy: HIERARCHICAL
            HierarchicalChunkingConfiguration:
              LevelConfigurations:
                - MaxTokens: 1500
                - MaxTokens: 300
              OverlapTokens: 60

  Outputs:
    KnowledgeBaseId:
      Value:
        Fn::GetAtt: [BedrockKnowledgeBase, KnowledgeBaseId]
    DataSourceId:
      Value:
        Fn::GetAtt: [BedrockDataSource, DataSourceId]

plugins:
  - serverless-python-requirements
  - serverless-dotenv-plugin
