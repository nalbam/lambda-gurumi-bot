# yaml-language-server: $schema=https://raw.githubusercontent.com/lalcebo/json-schema/master/serverless/reference.json
service: lambda-gurumi-ai-bot
provider:
  name: aws
  region: us-east-1
  runtime: python3.12
  stage: ${opt:stage, 'dev'}
  architecture: arm64
  memorySize: 5120
  timeout: 90
  environment:
    BASE_NAME: gurumi-ai-bot
    FOUNDATION_MODEL: ${env:FOUNDATION_MODEL, 'amazon.nova-lite-v1:0'}
    AGENT_ID:
      Fn::GetAtt: [BedrockAgent, AgentId]
    AGENT_ALIAS_ID:
      Fn::GetAtt: [BedrockAgentAlias, AgentAliasId]
  iamRoleStatements:
    - Effect: Allow
      Action:
        - dynamodb:GetItem
        - dynamodb:PutItem
        - dynamodb:Query
      Resource:
        - "arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.BASE_NAME}-*"
        - "arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.BASE_NAME}-*/index/*"
    - Effect: Allow
      Action:
        - bedrock:InvokeAgent
      Resource:
        - "arn:aws:bedrock:${self:provider.region}:*:agent-alias/*"

functions:
  mention:
    handler: handler.lambda_handler
    events:
      - http:
          method: post
          path: /slack/events

resources:
  Resources:
    DynamoDBTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.BASE_NAME}-${self:provider.stage}
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
          - AttributeName: user
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: user-index
            KeySchema:
              - AttributeName: user
                KeyType: HASH
            Projection:
              ProjectionType: KEYS_ONLY
            ProvisionedThroughput:
              ReadCapacityUnits: 5
              WriteCapacityUnits: 5
        ProvisionedThroughput:
          ReadCapacityUnits: 5
          WriteCapacityUnits: 5
        TimeToLiveSpecification:
          AttributeName: expire_at
          Enabled: true
        Tags:
          - Key: Project
            Value: ${self:provider.environment.BASE_NAME}

    S3Bucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName:
          Fn::Sub: ${self:provider.environment.BASE_NAME}-${AWS::AccountId}
        Tags:
          - Key: Project
            Value: ${self:provider.environment.BASE_NAME}

