service: lambda-gurumi-bot
frameworkVersion: "3"

provider:
  name: aws
  runtime: python3.12
  # Keep arch aligned with the GitHub Actions Ubuntu runner so pip installs
  # wheels that match the Lambda runtime (pydantic_core, etc.). Switching
  # back to arm64 needs a Docker-based build (serverless-python-requirements
  # dockerizePip) or a cross-platform wheel flag — deferred.
  architecture: x86_64
  region: ${env:AWS_REGION, 'us-east-1'}
  stage: ${opt:stage, 'dev'}
  memorySize: 5120
  timeout: 90
  stackTags:
    katalog_id: "858"
  tags:
    katalog_id: "858"
  environment:
    # --- runtime-internal (serverless-provided, not from CI env) ---
    # NOTE: AWS_REGION is auto-injected by the Lambda runtime and is a
    # reserved name we can't override here — src/config.py reads it directly
    # via os.getenv("AWS_REGION", ...). Do not add an AWS_REGION_NAME alias
    # here; no code reads it, so it was removed as dead config.
    DYNAMODB_TABLE_NAME: ${self:service}-${sls:stage}
    # --- secrets: Slack ---
    SLACK_BOT_TOKEN: ${env:SLACK_BOT_TOKEN}
    SLACK_SIGNING_SECRET: ${env:SLACK_SIGNING_SECRET}
    # --- secrets: LLM provider keys ---
    OPENAI_API_KEY: ${env:OPENAI_API_KEY, ''}
    XAI_API_KEY: ${env:XAI_API_KEY, ''}
    # --- secrets: Web search ---
    TAVILY_API_KEY: ${env:TAVILY_API_KEY, ''}
    # --- vars: LLM / Image ---
    IMAGE_MODEL: ${env:IMAGE_MODEL, 'gpt-image-1'}
    IMAGE_PROVIDER: ${env:IMAGE_PROVIDER, 'openai'}
    LLM_MODEL: ${env:LLM_MODEL, 'gpt-4o-mini'}
    LLM_PROVIDER: ${env:LLM_PROVIDER, 'openai'}
    # --- vars: Agent behavior ---
    AGENT_MAX_STEPS: ${env:AGENT_MAX_STEPS, '3'}
    MAX_OUTPUT_TOKENS: ${env:MAX_OUTPUT_TOKENS, '4096'}
    RESPONSE_LANGUAGE: ${env:RESPONSE_LANGUAGE, 'ko'}
    # --- vars: Slack UX ---
    BOT_CURSOR: ${env:BOT_CURSOR, ':robot_face:'}
    MAX_LEN_SLACK: ${env:MAX_LEN_SLACK, '3000'}
    SYSTEM_MESSAGE: ${env:SYSTEM_MESSAGE, ''}
    # --- vars: Access control / throttle ---
    ALLOWED_CHANNEL_IDS: ${env:ALLOWED_CHANNEL_IDS, ''}
    ALLOWED_CHANNEL_MESSAGE: ${env:ALLOWED_CHANNEL_MESSAGE, ''}
    MAX_THROTTLE_COUNT: ${env:MAX_THROTTLE_COUNT, '100'}
    # --- vars: Storage ---
    MAX_HISTORY_CHARS: ${env:MAX_HISTORY_CHARS, '4000'}
    # --- vars: Observability ---
    LOG_LEVEL: ${env:LOG_LEVEL, 'INFO'}
    # --- vars: Document / time ---
    DEFAULT_TIMEZONE: ${env:DEFAULT_TIMEZONE, 'Asia/Seoul'}
    MAX_DOC_BYTES: ${env:MAX_DOC_BYTES, '26214400'}
    MAX_DOC_CHARS: ${env:MAX_DOC_CHARS, '20000'}
    MAX_DOC_PAGES: ${env:MAX_DOC_PAGES, '50'}
    # --- vars: Web fetch ---
    JINA_READER_BASE: ${env:JINA_READER_BASE, 'https://r.jina.ai'}
    MAX_WEB_BYTES: ${env:MAX_WEB_BYTES, '2097152'}
    MAX_WEB_CHARS: ${env:MAX_WEB_CHARS, '8000'}
    MAX_WEB_LINKS: ${env:MAX_WEB_LINKS, '20'}
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:Query
          Resource:
            - !GetAtt ConversationTable.Arn
            - !Join ["", [!GetAtt ConversationTable.Arn, "/index/user-index"]]
        - Effect: Allow
          Action:
            - bedrock:InvokeModel
            - bedrock:InvokeModelWithResponseStream
            - bedrock:Converse
            - bedrock:ConverseStream
          Resource: "*"

plugins:
  - serverless-python-requirements

custom:
  pythonRequirements:
    slim: true
    layer: false
    noDeploy:
      - pytest
      - pytest-cov
      - moto
      - responses

functions:
  mention:
    handler: app.lambda_handler
    events:
      - http:
          path: slack/events
          method: post

resources:
  Resources:
    ConversationTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:service}-${sls:stage}
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
          - AttributeName: user
            AttributeType: S
          - AttributeName: expire_at
            AttributeType: N
        KeySchema:
          - AttributeName: id
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: user-index
            KeySchema:
              - AttributeName: user
                KeyType: HASH
              - AttributeName: expire_at
                KeyType: RANGE
            Projection:
              ProjectionType: KEYS_ONLY
            ProvisionedThroughput:
              ReadCapacityUnits: 5
              WriteCapacityUnits: 5
        TimeToLiveSpecification:
          AttributeName: expire_at
          Enabled: true
        ProvisionedThroughput:
          ReadCapacityUnits: 5
          WriteCapacityUnits: 5
